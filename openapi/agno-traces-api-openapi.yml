    TraceSearchRequest:
      properties:
        filter:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Filter
          description: 'FilterExpr DSL as JSON dict. Supports operators: EQ, NEQ, GT, GTE, LT, LTE, IN, CONTAINS, STARTSWITH, AND, OR, NOT.'
        group_by:
          $ref: '#/components/schemas/TraceSearchGroupBy'
          description: 'Grouping mode: ''run'' returns individual TraceDetail, ''session'' returns aggregated TraceSessionStats.'
          default: run
        page:
          type: integer
          minimum: 1
          title: Page
          description: Page number (1-indexed)
          default: 1
        limit:
          type: integer
          maximum: 100
          minimum: 1
          title: Limit
          description: Number of traces per page (max 100)
          default: 20
      type: object
      title: TraceSearchRequest
      description: "Request body for POST /traces/search with advanced filtering.\n\nThe filter field accepts a FilterExpr DSL dict supporting composable queries\nwith AND/OR/NOT logic and operators like EQ, NEQ, GT, GTE, LT, LTE, IN, CONTAINS, STARTSWITH.\n\nExample for run grouping (default):\n    {\n        \"filter\": {\n            \"op\": \"AND\",\n            \"conditions\": [\n                {\"op\": \"EQ\", \"key\": \"status\", \"value\": \"OK\"},\n                {\"op\": \"CONTAINS\", \"key\": \"user_id\", \"value\": \"admin\"}\n            ]\n        },\n        \"group_by\": \"run\",\n        \"page\": 1,\n        \"limit\": 20\n    }\n\nExample for session grouping:\n    {\n        \"filter\": {\"op\": \"EQ\", \"key\": \"agent_id\", \"value\": \"my-agent\"},\n        \"group_by\": \"session\",\n        \"page\": 1,\n        \"limit\": 20\n    }"
