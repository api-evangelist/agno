  /knowledge/{knowledge_id}/sources:
    get:
      tags:
      - Knowledge
      summary: List Content Sources
      description: List all registered content sources (S3, GCS, SharePoint, GitHub) for the knowledge base.
      operationId: list_content_sources
      security:
      - HTTPBearer: []
      parameters:
      - name: knowledge_id
        in: path
        required: true
        schema:
          type: string
          description: ID of the knowledge base
          title: Knowledge Id
        description: ID of the knowledge base
      - name: db_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The ID of the database to use
          title: Db Id
        description: The ID of the database to use
      responses:
        '200':
          description: Content sources retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RemoteContentSourceSchema'
                title: Response List Content Sources
              example:
              - id: company-s3
                name: Company Documents
                type: s3
                prefix: documents/
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthenticatedResponse'
        '404':
          description: Knowledge base not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
  /knowledge/{knowledge_id}/sources/{source_id}/files:
    get:
      tags:
      - Knowledge
      summary: List Files in Source
      description: List available files and folders in a specific content source. Supports pagination and folder navigation.
      operationId: list_source_files
      security:
      - HTTPBearer: []
      parameters:
      - name: knowledge_id
        in: path
        required: true
        schema:
          type: string
          description: ID of the knowledge base
          title: Knowledge Id
        description: ID of the knowledge base
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          description: ID of the content source
          title: Source Id
        description: ID of the content source
      - name: prefix
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Path prefix to filter files
          title: Prefix
        description: Path prefix to filter files
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Number of files per page
          default: 100
          title: Limit
        description: Number of files per page
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number (1-indexed)
          default: 1
          title: Page
        description: Page number (1-indexed)
      - name: delimiter
        in: query
        required: false
        schema:
          type: string
          description: Folder delimiter (enables folder grouping)
          default: /
          title: Delimiter
        description: Folder delimiter (enables folder grouping)
      - name: db_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The ID of the database to use
          title: Db Id
        description: The ID of the database to use
      responses:
        '200':
          description: Files listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceFilesResponseSchema'
              example:
                source_id: company-s3
                source_name: Company Documents
                prefix: reports/
                folders:
                - prefix: reports/2024/
                  name: '2024'
                  is_empty: false
                files:
                - key: reports/annual-summary.pdf
                  name: annual-summary.pdf
                  size: 102400
                  last_modified: '2024-01-15T10:30:00Z'
                  content_type: application/pdf
                meta:
                  page: 1
                  limit: 100
                  total_pages: 1
                  total_count: 1
        '400':
          description: Unsupported source type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthenticatedResponse'
        '404':
          description: Knowledge base or content source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
