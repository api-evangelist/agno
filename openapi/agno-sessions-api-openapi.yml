openapi: 3.1.0
info:
  title: Agno API Reference A2A Sessions API
  description: The all-in-one, private, secure agent platform that runs in your cloud.
  version: 2.5.6
tags:
- name: Sessions
paths:
  /sessions:
    get:
      tags:
      - Sessions
      summary: List Sessions
      description: Retrieve paginated list of sessions with filtering and sorting options. Supports filtering by session type (agent, team, workflow), component, user, and name. Sessions represent conversation histories and execution contexts.
      operationId: get_sessions
      security:
      - HTTPBearer: []
      parameters:
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SessionType'
          description: Type of sessions to retrieve (agent, team, or workflow)
          default: agent
        description: Type of sessions to retrieve (agent, team, or workflow)
      - name: component_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter sessions by component ID (agent/team/workflow ID)
          title: Component Id
        description: Filter sessions by component ID (agent/team/workflow ID)
      - name: user_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter sessions by user ID
          title: User Id
        description: Filter sessions by user ID
      - name: session_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter sessions by name (partial match)
          title: Session Name
        description: Filter sessions by name (partial match)
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: Number of sessions to return per page
          default: 20
          title: Limit
        description: Number of sessions to return per page
      - name: page
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Page number for pagination
          default: 1
          title: Page
        description: Page number for pagination
      - name: sort_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Field to sort sessions by
          default: created_at
          title: Sort By
        description: Field to sort sessions by
      - name: sort_order
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/SortOrder'
          - type: 'null'
          description: Sort order (asc or desc)
          default: desc
          title: Sort Order
        description: Sort order (asc or desc)
      - name: db_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Database ID to query sessions from
          title: Db Id
        description: Database ID to query sessions from
      - name: table
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The database table to use
          title: Table
        description: The database table to use
      responses:
        '200':
          description: Sessions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_SessionSchema_'
              example:
                session_example:
                  summary: Example session response
                  value:
                    data:
                    - session_id: 6f6cfbfd-9643-479a-ae47-b8f32eb4d710
                      session_name: What tools do you have?
                      session_state: {}
                      created_at: '2025-09-05T16:02:09Z'
                      updated_at: '2025-09-05T16:02:09Z'
        '400':
          description: Invalid session type or filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthenticatedResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation error in query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
    post:
      tags:
      - Sessions
      summary: Create New Session
      description: Create a new empty session with optional configuration. Useful for pre-creating sessions with specific session_state, metadata, or other properties before running any agent/team/workflow interactions. The session can later be used by providing its session_id in run requests.
      operationId: create_session
      security:
      - HTTPBearer: []
      parameters:
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SessionType'
          description: Type of session to create (agent, team, or workflow)
          default: agent
        description: Type of session to create (agent, team, or workflow)
      - name: db_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Database ID to create session in
          title: Db Id
        description: Database ID to create session in
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
              description: Session configuration data
              default: {}
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/AgentSessionDetailSchema'
                - $ref: '#/components/schemas/TeamSessionDetailSchema'
                - $ref: '#/components/schemas/WorkflowSessionDetailSchema'
                title: Response Create Session
              examples:
                agent_session_example:
                  summary: Example created agent session
                  value:
                    user_id: user-123
                    agent_session_id: new-session-id
                    session_id: new-session-id
                    session_name: New Session
                    session_state:
                      key: value
                    metadata:
                      key: value
                    agent_id: agent-1
                    created_at: '2025-10-21T12:00:00Z'
                    updated_at: '2025-10-21T12:00:00Z'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthenticatedResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Failed to create session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
    delete:
      tags:
      - Sessions
      summary: Delete Multiple Sessions
      description: Delete multiple sessions by their IDs in a single operation. This action cannot be undone and will permanently remove all specified sessions and their runs.
      operationId: delete_sessions
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: User ID to scope deletion to
          title: User Id
        description: User ID to scope deletion to
      - name: db_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Database ID to use for deletion
          title: Db Id
        description: Database ID to use for deletion
      - name: table
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Table to use for deletion
          title: Table
        description: Table to use for deletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSessionRequest'
      responses:
        '204':
          description: Sessions deleted successfully
        '400':
          description: Invalid request - session IDs and types length mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthenticatedResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Failed to delete sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
