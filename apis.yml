aid: agno
name: Agno
description: >-
  Agno (formerly Phidata) is a high-performance open-source Python framework for
  building multi-modal, multi-agent systems with memory, knowledge, tools, and
  reasoning capabilities. It provides both an agent development SDK and AgentOS,
  a production runtime that transforms agents into managed APIs with 50+
  endpoints for runs, sessions, memory, knowledge, traces, evaluations, and
  scheduling. AgentOS supports RBAC, per-user session isolation, streaming via
  Server-Sent Events, background execution, and human-in-the-loop approval
  flows. The platform supports 30+ LLM providers and can be deployed on AWS,
  GCP, Railway, or air-gapped environments with data remaining in the
  customer's cloud.
type: Index
