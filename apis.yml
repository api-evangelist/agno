apis:
  - aid: agno:agentos-api
    name: AgentOS Agent API
    description: >-
      The AgentOS Agent API provides 50+ RESTful endpoints for managing agents
      in production. Endpoints cover runs (create, list, cancel, resume),
      sessions (user-scoped with full history), memory (CRUD with search and
      filtering), knowledge (file and URL uploads with vector/keyword/hybrid
      search), evaluations, traces (full span trees with filtering DSL), metrics
      (daily aggregated usage and token analytics), schedules (recurring agent
      tasks), and approvals (human-in-the-loop gating). Authentication uses JWT
      Bearer tokens with role-based access control. The API is FastAPI-based with
      live docs at /docs and an OpenAPI spec at /openapi.json. Multipart
      form-data supports combined text, files, and media in a single call.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
